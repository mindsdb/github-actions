# Apply per-PR image tags to the anchor PR's ArgoCD environment.
#
# Resolves:
#   - This PR (anchor) — own head SHA, repo short name from $GITHUB_REPOSITORY.
#   - Any `Deploys: org/repo#N` line in the anchor PR body — looks up each
#     linked PR's head SHA via the GitHub REST API.
#
# Issues a single `argocd app set` against the parent Application
# (`pr-<anchor>-<num>`) with `--helm-set tags.<repo>=development-<sha>` per
# resolved repo. ArgoCD's automated sync + the sync-wave annotations on the
# parent's children handle the rollout — no `argocd app sync` is issued here.
#
# Must run from a `pull_request` event; PR number and head SHA are read from
# $GITHUB_EVENT_PATH so callers don't have to pass them.
#
# Requires `curl` + `jq` on the runner. Does NOT require `gh` (the action
# talks to the GitHub REST API directly). Installs `argocd` to $RUNNER_TEMP
# if it's not already on PATH.

name: ArgoCD Deploy (PR env)
description: Update the per-PR env's parent Application with own + linked image tags.

inputs:
  argocd-token:
    description: ArgoCD API token (for the ci-pr-envs account).
    required: true
  gh-token:
    description: GitHub PAT used to query cross-referenced PRs' head SHAs.
    required: true
  argocd-server:
    description: ArgoCD server hostname.
    required: false
    default: argo.dev.mindsdb.com
  argocd-version:
    description: ArgoCD CLI version installed when missing from the runner.
    required: false
    default: v2.13.1

runs:
  using: composite
  steps:
    - shell: bash
      env:
        ARGOCD_SERVER: ${{ inputs.argocd-server }}
        ARGOCD_AUTH_TOKEN: ${{ inputs.argocd-token }}
        ARGOCD_VERSION: ${{ inputs.argocd-version }}
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        set -euo pipefail

        # Fail fast on empty tokens — otherwise argocd silently falls back to
        # an interactive `Username:` prompt and dies with `fatal msg=EOF`.
        : "${ARGOCD_AUTH_TOKEN:?ARGOCD_AUTH_TOKEN is empty — check the org/repo secret is set and visible to this repo}"
        : "${GH_TOKEN:?GH_TOKEN is empty — pass GH_PRIVATE_ACCESS_TOKEN via the gh-token input}"

        OWN_REPO="$GITHUB_REPOSITORY"
        OWN_SHORT="${OWN_REPO##*/}"
        PR_NUMBER="$(jq -r .pull_request.number  "$GITHUB_EVENT_PATH")"
        OWN_SHA="$(  jq -r .pull_request.head.sha "$GITHUB_EVENT_PATH")"
        PARENT_APP="pr-${OWN_SHORT}-${PR_NUMBER}"

        # GitHub REST helper — auth + sensible headers in one place. No `gh`
        # dependency: self-hosted runners may not have it.
        gh_api() {
          curl -sfH "Authorization: Bearer $GH_TOKEN" \
               -H "Accept: application/vnd.github+json" \
               "https://api.github.com$1"
        }

        # Build `--helm-set tags.<repo>=development-<sha>` for own + any linked
        # PRs in the anchor body. Self-links and unresolvable PRs are skipped.
        set_args=( --helm-set "tags.${OWN_SHORT}=development-${OWN_SHA}" )
        while IFS=: read -r repo sha; do
          set_args+=( --helm-set "tags.${repo}=development-${sha}" )
        done < <(
          gh_api "/repos/$OWN_REPO/pulls/$PR_NUMBER" \
            | jq -r '.body // ""' \
            | grep -oE 'Deploys:[[:space:]]+[^#[:space:]]+#[0-9]+' \
            | while read -r _kw ref; do
                full="${ref%%#*}"; num="${ref##*#}"
                [ "$full" = "$OWN_REPO" ] && continue
                sha="$(gh_api "/repos/$full/pulls/$num" | jq -r '.head.sha // empty')" || continue
                [ -n "$sha" ] && echo "${full##*/}:${sha}"
              done
        )

        # Install argocd CLI to a writable location if missing. /usr/local/bin
        # is owned by root on self-hosted runners; $RUNNER_TEMP is per-job
        # and always user-writable.
        if command -v argocd >/dev/null 2>&1; then
          ARGOCD_BIN=argocd
        else
          ARGOCD_BIN="${RUNNER_TEMP:-/tmp}/argocd"
          if [ ! -x "$ARGOCD_BIN" ]; then
            curl -sSLo "$ARGOCD_BIN" "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
            chmod +x "$ARGOCD_BIN"
          fi
        fi

        # Skip `argocd login` — it doesn't honour --auth-token (login only
        # accepts username/password/sso), and the ARGOCD_SERVER +
        # ARGOCD_AUTH_TOKEN env vars set above are picked up by every
        # subsequent argocd command directly.
        echo "argocd app set ${PARENT_APP} ${set_args[*]}"
        "$ARGOCD_BIN" app set "$PARENT_APP" --grpc-web "${set_args[@]}"
