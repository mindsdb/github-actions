# Apply per-PR image tags to the anchor PR's ArgoCD environment.
#
# Resolves:
#   - This PR (anchor) — own merge SHA (image built in this same run), repo
#     short name from $GITHUB_REPOSITORY.
#   - Any `Deploys: repo#N` or `Deploys: org/repo#N` line in the anchor PR
#     body (owner defaults to this repo's org) — looks up each linked PR's
#     head + merge SHAs via the GitHub REST API.
#   - `Deploys: repo#staging` — no API lookup; pins that repo to the
#     `staging` ECR image tag + `staging` git branch. Useful for testing
#     the anchor PR against non-PR-branch versions of a sibling service.
#
# Linked-PR image tags resolve in order:
#   1. `development-head-<head sha>` — pushed by build-push-ecr's PR
#      dual-tag. Head SHAs are immutable, so this pin can't go stale.
#   2. `development-<merge sha>` — back-compat with images built before
#      dual-tagging. GitHub regenerates the synthetic merge SHA whenever
#      base or head moves, so resolving it at deploy time can name a twin
#      commit no build ever pushed.
#   3. Neither exists in ECR → the job fails loudly with a fix (re-run the
#      linked repo's pipeline), instead of pinning a phantom tag and leaving
#      the env in ImagePullBackOff silently.
# Every pinned tag — the anchor's own included — is existence-checked
# against ECR (`aws ecr describe-images`; GitHub short name maps to the
# `mindsdb-<name-with-hyphens>` ECR repo). Only Image/RepositoryNotFound
# count as absent; if the aws CLI is missing or errors for infra reasons
# (auth, throttle, network) the checks are skipped with one warning rather
# than blocking a deploy that would have worked.
#
# `Deploys:`-looking body lines that don't match the accepted forms (e.g. a
# pasted PR URL) emit a ::warning:: instead of being silently ignored.
#
# Issues a single `argocd app set` against the parent Application
# (`pr-<anchor>-<num>`) with `--helm-set tags.<repo>=development-<sha>` per
# resolved repo, kicks the auto-sync via `argocd app sync --async`, and then
# blocks on `argocd app wait` (up to 30m) so the GH job stays open until
# the env is actually up.
#
# Rollout state surfaces in the PR via the caller workflow's `environment:`
# block (native GH Deployment). The PR sidebar pill is `in_progress` while
# the job runs and flips to `success`/`failure` on the job's exit code.
#
# Must run from a `pull_request` event; PR number and head SHA are read from
# $GITHUB_EVENT_PATH so callers don't have to pass them.
#
# Requires `curl` + `jq` on the runner. Does NOT require `gh` (the action
# talks to the GitHub REST API directly). Uses the ambient `aws` CLI for
# the ECR existence checks when present (degrades to a warning when not).
# Installs `argocd` to $RUNNER_TEMP if it's not already on PATH.

name: ArgoCD Deploy (PR env)
description: Update the per-PR env's parent Application with own + linked image tags.

inputs:
  argocd-token:
    description: ArgoCD API token (for the ci-pr-envs account).
    required: true
  gh-token:
    description: GitHub PAT used to query cross-referenced PRs' head SHAs.
    required: true
  argocd-server:
    description: ArgoCD server hostname.
    required: false
    default: argo.dev.mindsdb.com
  argocd-version:
    description: ArgoCD CLI version installed when missing from the runner.
    required: false
    default: v2.13.1

runs:
  using: composite
  steps:
    - shell: bash
      env:
        ARGOCD_SERVER: ${{ inputs.argocd-server }}
        ARGOCD_AUTH_TOKEN: ${{ inputs.argocd-token }}
        ARGOCD_VERSION: ${{ inputs.argocd-version }}
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        set -euo pipefail

        # Fail fast on empty tokens — otherwise argocd silently falls back to
        # an interactive `Username:` prompt and dies with `fatal msg=EOF`.
        : "${ARGOCD_AUTH_TOKEN:?ARGOCD_AUTH_TOKEN is empty — check the org/repo secret is set and visible to this repo}"
        : "${GH_TOKEN:?GH_TOKEN is empty — pass GH_PRIVATE_ACCESS_TOKEN via the gh-token input}"

        OWN_REPO="$GITHUB_REPOSITORY"
        OWN_SHORT="${OWN_REPO##*/}"
        # Slugified form for K8s resource names + labels. RFC 1123 forbids
        # underscores in Application names / Namespaces / hostnames, but
        # `mindshub_frontend` is the canonical GitHub repo name and stays
        # underscored everywhere it identifies the repo (helm parameter
        # keys, the `Deploys:` regex, ECR image tags).
        OWN_SLUG="${OWN_SHORT//_/-}"
        PR_NUMBER="$(jq -r .pull_request.number "$GITHUB_EVENT_PATH")"

        # Two SHAs, used for two different things:
        #   $GITHUB_SHA              = merge SHA (PR head merged into base, a
        #                              synthetic commit only reachable via
        #                              refs/pull/N/merge). build-push-ecr tags
        #                              images as `development-${GITHUB_SHA}`,
        #                              so the image-tag override uses this.
        #   .pull_request.head.sha   = PR branch tip — the commit ArgoCD's
        #                              repo-server can actually fetch as a
        #                              `targetRevision`. Used for the chart
        #                              revision so chart changes on the PR
        #                              branch deploy with the PR.
        OWN_MERGE_SHA="$GITHUB_SHA"
        OWN_HEAD_SHA="$(jq -r .pull_request.head.sha "$GITHUB_EVENT_PATH")"
        PARENT_APP="pr-${OWN_SLUG}-${PR_NUMBER}"

        # GitHub REST helper — auth + sensible headers in one place. No `gh`
        # dependency: self-hosted runners may not have it.
        gh_api() {
          curl -sfH "Authorization: Bearer $GH_TOKEN" \
               -H "Accept: application/vnd.github+json" \
               "https://api.github.com$1"
        }

        # ECR image-existence guard. Maps a GitHub repo short name to its
        # ECR repository (`mindsdb-` + short name, underscores to hyphens)
        # and asks ECR whether <tag> exists. Returns 0 = present, 1 = absent.
        # Only ImageNotFoundException / RepositoryNotFoundException count as
        # absent; any other failure (no aws CLI, auth, throttle, network)
        # must never brick a deploy that would have worked — warn ONCE,
        # remember ECR is unusable, and report every tag as present from
        # then on.
        ECR_CHECKS=on
        ecr_tag_exists() {
          local ecr_repo="mindsdb-${1//_/-}" tag="$2" err
          [ "$ECR_CHECKS" = on ] || return 0
          if ! command -v aws >/dev/null 2>&1; then
            ECR_CHECKS=off
            echo "::warning::aws CLI not found on this runner — ECR image-existence checks skipped, tags assumed present."
            return 0
          fi
          if err="$(aws ecr describe-images \
                      --repository-name "$ecr_repo" \
                      --image-ids "imageTag=${tag}" \
                      --region "${AWS_REGION:-us-east-1}" 2>&1 >/dev/null)"; then
            return 0
          fi
          case "$err" in
            *ImageNotFoundException*|*RepositoryNotFoundException*)
              return 1
              ;;
            *)
              ECR_CHECKS=off
              echo "::warning::ECR describe-images failed (${err//$'\n'/ }) — image-existence checks skipped, tags assumed present."
              return 0
              ;;
          esac
        }

        # Fetch the PR body ONCE — the strict `Deploys:` extraction and the
        # lint below both reuse it. Strip \r so CRLF bodies don't trip the
        # line-anchored lint pattern. Fail with a diagnosable message rather
        # than letting `set -e` kill the step mutely on an API blip.
        PR_BODY="$(gh_api "/repos/$OWN_REPO/pulls/$PR_NUMBER" | jq -r '.body // ""' | tr -d '\r')" || {
          echo "::error::Could not fetch PR #${PR_NUMBER} body from the GitHub API (needed to resolve Deploys: links) — transient API failure or bad GH_TOKEN. Re-run the job."
          exit 1
        }

        # Lint: `Deploys:`-looking lines that don't match the strict form
        # would otherwise be silently ignored and the env would quietly run
        # defaults — the classic offender is a pasted PR URL. Warn per line.
        while IFS= read -r line; do
          if ! printf '%s\n' "$line" | grep -qE 'Deploys:[[:space:]]+[^#[:space:]]+#([0-9]+|staging)'; then
            echo "::warning::Ignoring unrecognised Deploys line: '${line}'. Accepted forms: 'Deploys: repo#N', 'Deploys: org/repo#N', 'Deploys: repo#staging' (PR URLs are not parsed)."
          fi
        done < <(printf '%s\n' "$PR_BODY" | grep -iE '^[[:space:]]*deploys?:' || true)

        # Build the override list — for each known PR (own + every linked
        # one) we emit two helm-set args:
        #   tags.<repo>=<image tag>      resolved per the header's order
        #   revisions.<repo>=<head-sha>  chart git revision (ArgoCD fetches
        #                                the chart at this commit; pr-branch
        #                                chart changes deploy with the PR)
        # Links accept `Deploys: repo#N` (owner defaults to this repo's
        # org), `Deploys: org/repo#N`, or `Deploys: repo#staging` (pin the
        # linked repo to that env's moving image tag + `staging` branch —
        # no API lookup, both values reused verbatim from that env's
        # release pipeline). Self-links are skipped; unresolvable PRs
        # are skipped with a warning.
        #
        # The anchor's own image is tagged from the merge SHA by the build
        # job in this same run — no cross-PR race — but it still gets the
        # existence check so a failed/skipped build fails HERE, not as an
        # ImagePullBackOff in the env.
        OWN_TAG="development-${OWN_MERGE_SHA}"
        if ! ecr_tag_exists "$OWN_SHORT" "$OWN_TAG"; then
          echo "::error::ECR image mindsdb-${OWN_SLUG}:${OWN_TAG} not found — did the build job in this run succeed?"
          exit 1
        fi
        set_args=(
          --helm-set "tags.${OWN_SHORT}=${OWN_TAG}"
          --helm-set "revisions.${OWN_SHORT}=${OWN_HEAD_SHA}"
        )

        # Linked PRs resolve in two phases. Phase 1 (inside the process
        # substitution): parse the body + hit the GitHub API, emitting one
        # colon-delimited line per link — colons are safe, SHAs and repo
        # names never contain them. Phase 2 (the while loop, which runs in
        # the MAIN shell): pick an image tag via the ECR guard and abort
        # when nothing exists. The split matters: `exit 1` inside `< <(...)`
        # only kills that subshell, so the existence checks and the abort
        # must live out here where exit actually terminates the step (and
        # where the guard's warn-once cache persists across iterations).
        while IFS=: read -r kind link repo merge_sha head_sha; do
          case "$kind" in
            staging)
              set_args+=(
                --helm-set "tags.${repo}=staging"
                --helm-set "revisions.${repo}=staging"
              )
              ;;
            pr)
              # Prefer the head-SHA tag: PR head SHAs are immutable, so the
              # pin can't go stale. Fall back to the merge-SHA tag for
              # images built before dual-tagging — GitHub regenerates the
              # synthetic merge SHA whenever base or head moves, so this
              # deploy-time lookup can name a twin commit no build ever
              # pushed; the guard catches exactly that case.
              head_tag="development-head-${head_sha}"
              merge_tag="development-${merge_sha}"
              if ecr_tag_exists "$repo" "$head_tag"; then
                tag="$head_tag"
              elif ecr_tag_exists "$repo" "$merge_tag"; then
                tag="$merge_tag"
              else
                echo "::error::No ECR image for linked PR ${link}: neither ${head_tag} nor ${merge_tag} exists in mindsdb-${repo//_/-}. The linked PR's base moved after its last build regenerated the merge SHA; re-run the linked repo's pipeline to build a fresh image, then re-run this job."
                exit 1
              fi
              set_args+=(
                --helm-set "tags.${repo}=${tag}"
                --helm-set "revisions.${repo}=${head_sha}"
              )
              ;;
          esac
        done < <(
          printf '%s\n' "$PR_BODY" \
            | grep -oE 'Deploys:[[:space:]]+[^#[:space:]]+#([0-9]+|staging)' \
            | while read -r _kw ref; do
                full="${ref%%#*}"; num="${ref##*#}"
                case "$full" in
                  */*) ;;
                  *)   full="${OWN_REPO%%/*}/$full" ;;
                esac
                [ "$full" = "$OWN_REPO" ] && continue
                # `#staging` — reuse the linked repo's staging pipeline
                # outputs: `staging` ECR image tag + `staging` git branch.
                if [ "$num" = "staging" ]; then
                  echo "staging:${full}#staging:${full##*/}::"
                  continue
                fi
                # One API call, both SHAs out. merge_commit_sha is null on
                # unmergeable PRs; we skip those.
                merge_sha=""; head_sha=""
                read -r merge_sha head_sha < <(
                  gh_api "/repos/$full/pulls/$num" \
                    | jq -r '[.merge_commit_sha // "", .head.sha // ""] | @tsv'
                ) || true
                if [ -n "${merge_sha:-}" ] && [ -n "${head_sha:-}" ]; then
                  echo "pr:${full}#${num}:${full##*/}:${merge_sha}:${head_sha}"
                else
                  echo "::warning::Deploys link ${full}#${num} could not be resolved (PR missing or unmergeable); skipping" >&2
                fi
              done
        )

        # Install argocd CLI to a writable location if missing. /usr/local/bin
        # is owned by root on self-hosted runners; $RUNNER_TEMP is per-job
        # and always user-writable.
        if command -v argocd >/dev/null 2>&1; then
          ARGOCD_BIN=argocd
        else
          ARGOCD_BIN="${RUNNER_TEMP:-/tmp}/argocd"
          if [ ! -x "$ARGOCD_BIN" ]; then
            curl -sSLo "$ARGOCD_BIN" "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
            chmod +x "$ARGOCD_BIN"
          fi
        fi

        # Skip `argocd login` — it doesn't honour --auth-token (login only
        # accepts username/password/sso), and the ARGOCD_SERVER +
        # ARGOCD_AUTH_TOKEN env vars set above are picked up by every
        # subsequent argocd command directly.

        # Retry `app set` directly until the parent App is set-able. Three
        # transient states are tolerated; anything else is fatal:
        #   1. App doesn't exist yet — ApplicationSet hasn't run its 60s
        #      requeue cycle and created it (NotFound, or PermissionDenied
        #      for API-key accounts that can't see non-existent apps).
        #   2. App exists but is being DELETED — label was removed then
        #      re-added; AppSet is mid-delete before recreating. `app set`
        #      returns "application is being deleted".
        #   3. Network blip — covered by the same retry.
        # 5 minutes is comfortably past both the AppSet requeue and the
        # typical Application finaliser cleanup.
        echo "argocd app set ${PARENT_APP} ${set_args[*]}"
        for i in $(seq 1 30); do
          if set_err="$("$ARGOCD_BIN" app set "$PARENT_APP" --grpc-web "${set_args[@]}" 2>&1)"; then
            break
          fi
          case "$set_err" in
            *PermissionDenied*|*NotFound*|*"not found"*|*"permission denied"*|*"being deleted"*) ;;
            *)
              echo "argocd app set ${PARENT_APP} failed unexpectedly:" >&2
              echo "$set_err" >&2
              exit 1
              ;;
          esac
          if [ "$i" -eq 30 ]; then
            echo "Timed out waiting for Application ${PARENT_APP} to be set-able." >&2
            echo "Last error: $set_err" >&2
            echo "Check the PR carries the 'deploy' label and the ApplicationSet controller is healthy." >&2
            exit 1
          fi
          echo "Application ${PARENT_APP} not set-able (attempt ${i}/30): $set_err"
          sleep 10
        done

        # A sync operation may be in flight — e.g. the parent's very first
        # automated sync, or a rollout from a previous commit stuck waiting on
        # an unhealthy wave. `app set` updates the spec but does NOT interrupt
        # a running operation, and ArgoCD won't start the auto-sync carrying
        # the new parameters until the current operation ends — which it never
        # does if a wave is wedged (e.g. ImagePullBackOff). Terminate it; the
        # terminated operation ran with the OLD parameters, so automated sync
        # immediately starts a fresh one with the parameters set above. When
        # nothing is running the CLI errors ("Unable to terminate operation.
        # No operation is in progress"), which is the normal case and fine.
        # (TerminateOperation requires the `applications, sync` RBAC grant.)
        if term_err="$("$ARGOCD_BIN" app terminate-op "$PARENT_APP" --grpc-web 2>&1)"; then
          echo "Terminated in-flight sync on ${PARENT_APP}; automated sync will restart with the new parameters."
        else
          echo "No in-flight sync to terminate on ${PARENT_APP} (${term_err})."
        fi

        # Explicitly request a sync rather than waiting for the application
        # controller's reconciliation poll to notice the spec change. The CLI
        # call returns once the operation has been *queued* (--async); we
        # don't wait for the full rollout here because parent syncs are
        # wave-gated and can take minutes — that's argocd's job to drive
        # from this point on.
        #
        # FailedPrecondition: "another operation is already in progress"
        # means automated.sync ALREADY queued an op in response to our
        # `app set` (which happens within ~ms when automated sync is on).
        # That's the success case for us — bail with a friendly log, not
        # exit 1. Any other failure (RBAC, connectivity) still fatals.
        echo "argocd app sync ${PARENT_APP} --async"
        if sync_err="$("$ARGOCD_BIN" app sync "$PARENT_APP" --grpc-web --async 2>&1)"; then
          echo "Sync queued."
        else
          case "$sync_err" in
            *"another operation is already in progress"*)
              echo "Sync was already in progress (automated.sync picked up the app set change); nothing to do."
              ;;
            *)
              echo "$sync_err" >&2
              exit 1
              ;;
          esac
        fi

        # Block until the whole env reaches Synced+Healthy with no in-flight
        # sync, or fail the job after 30m. We wait on the LABEL SET (parent
        # + every child Application), not just the parent: the parent's
        # status.health.status is Healthy as soon as its rendered children
        # exist, even when those children are still OutOfSync from the spec
        # we just `app set`. Without `--sync` and `--operation`, wait would
        # return immediately on the old pods' Healthy state. The label is
        # written by the AppSet template onto the parent and by `prenv.labels`
        # onto every child, so this one selector covers both.
        WAIT_SELECTOR="pr-env.mindsdb.com/anchor-repo=${OWN_SLUG},pr-env.mindsdb.com/pr-number=${PR_NUMBER}"
        echo "argocd app wait -l ${WAIT_SELECTOR} --sync --health --operation --timeout 1800"
        "$ARGOCD_BIN" app wait -l "$WAIT_SELECTOR" --grpc-web --sync --health --operation --timeout 1800
